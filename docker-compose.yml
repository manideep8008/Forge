services:
  # === Data Layer ===
  forge-redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  forge-postgres:
    image: postgres:16-alpine
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-forge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Must be set — no default}======
      POSTGRES_DB: ${POSTGRES_DB:-forge}
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-forge}"]
      interval: 5s
      timeout: 3s
      retries: 5

  forge-chroma:
    image: chromadb/chroma:latest
    ports:
      - "127.0.0.1:${CHROMA_PORT:-8000}:8000"
    volumes:
      - chroma-data:/chroma/chroma
    environment:
      ANONYMIZED_TELEMETRY: "false"

  # === Python Orchestrator ===
  forge-orchestrator:
    build:
      context: ./forge-orchestrator
      dockerfile: Dockerfile
    environment:
      REDIS_URL: redis://forge-redis:6379
      POSTGRES_URL: postgresql://${POSTGRES_USER:-forge}:${POSTGRES_PASSWORD:?Must be set}@forge-postgres:5432/${POSTGRES_DB:-forge}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:?Must be set — no default}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      CHROMA_HOST: forge-chroma
      CHROMA_PORT: 8000
      GIT_SVC_URL: http://forge-git-svc:8081
      DOCKER_SVC_URL: http://forge-docker-svc:8082
      MODEL_REQUIREMENTS: ${MODEL_REQUIREMENTS:-qwen3.5:397b-cloud}
      MODEL_ARCHITECT: ${MODEL_ARCHITECT:-qwen3.5:397b-cloud}
      MODEL_CODEGEN: ${MODEL_CODEGEN:-qwen3.5:397b-cloud}
      MODEL_REVIEW: ${MODEL_REVIEW:-qwen3.5:397b-cloud}
      MODEL_TEST: ${MODEL_TEST:-qwen3.5:397b-cloud}
      MODEL_CICD: ${MODEL_CICD:-devstral-small-2:24b-cloud}
      MODEL_INTENT: ${MODEL_INTENT:-qwen3.5:397b-cloud}
      MODEL_EMBEDDING: ${MODEL_EMBEDDING:-nomic-embed-text}
    depends_on:
      forge-redis:
        condition: service_healthy
      forge-postgres:
        condition: service_healthy
      forge-chroma:
        condition: service_started
    volumes:
      - workspace:/workspace

  # === Go Services ===
  forge-gateway:
    build:
      context: ./forge-gateway
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:${GATEWAY_PORT:-8080}:8080"
    environment:
      REDIS_URL: redis://forge-redis:6379
      POSTGRES_URL: postgresql://${POSTGRES_USER:-forge}:${POSTGRES_PASSWORD:?Must be set}@forge-postgres:5432/${POSTGRES_DB:-forge}
      ORCHESTRATOR_URL: http://forge-orchestrator:8090
      GIT_SVC_URL: http://forge-git-svc:8081
      DOCKER_SVC_URL: http://forge-docker-svc:8082
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:?Must be set — no default}
      JWT_SECRET: ${JWT_SECRET:?Must be set — no default}
      RATE_LIMIT_PIPELINE: ${RATE_LIMIT_PIPELINE:-10}
      RATE_LIMIT_QUERY: ${RATE_LIMIT_QUERY:-100}
      DEV_MODE: "${DEV_MODE:-false}"
    depends_on:
      forge-redis:
        condition: service_healthy
      forge-postgres:
        condition: service_healthy

  # One-shot init: creates a git repo in the shared workspace volume
  workspace-init:
    image: alpine/git
    entrypoint: /bin/sh
    command: >
      -c "
        git config --global --add safe.directory /workspace &&
        if [ ! -d /workspace/.git ]; then
          git init /workspace &&
          git -C /workspace config user.email 'forge@local' &&
          git -C /workspace config user.name 'Forge' &&
          git -C /workspace commit --allow-empty -m 'chore: init workspace';
        fi
      "
    volumes:
      - workspace:/workspace

  forge-git-svc:
    build:
      context: ./forge-git-svc
      dockerfile: Dockerfile
    environment:
      REDIS_URL: redis://forge-redis:6379
      # Go main.go reads REDIS_ADDR as host:port (not a full URL)
      REDIS_ADDR: forge-redis:6379
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:?Must be set — no default}
    depends_on:
      forge-redis:
        condition: service_healthy
      workspace-init:
        condition: service_completed_successfully
    volumes:
      - workspace:/workspace

  # Restricted Docker API proxy (Tecnativa). Only this container touches the
  # host Docker socket; forge-docker-svc reaches the daemon over TCP through
  # an allowlisted subset of endpoints. Keeps the C3/C4 fix intact while
  # letting build/deploy/exec work.
  forge-docker-proxy:
    image: tecnativa/docker-socket-proxy:0.3
    environment:
      # Allowlist: only what docker-svc actually needs.
      CONTAINERS: 1
      IMAGES: 1
      BUILD: 1
      EXEC: 1
      NETWORKS: 1
      VOLUMES: 1
      INFO: 1
      VERSION: 1
      POST: 1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped

  forge-docker-svc:
    build:
      context: ./forge-docker-svc
      dockerfile: Dockerfile
    environment:
      REDIS_URL: redis://forge-redis:6379
      REDIS_ADDR: forge-redis:6379
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:?Must be set — no default}
      # Talk to the daemon via the restricted proxy, never the raw socket.
      DOCKER_HOST: ${DOCKER_HOST:-tcp://forge-docker-proxy:2375}
    depends_on:
      forge-redis:
        condition: service_healthy
      forge-docker-proxy:
        condition: service_started
    volumes:
      - workspace:/workspace

  # === Frontend ===
  forge-ui:
    build:
      context: ./forge-web
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-3000}:3000"
    environment:
      VITE_API_URL: http://forge-gateway:8080
    depends_on:
      - forge-gateway
    volumes:
      - ./forge-web:/app
      - /app/node_modules

  # === Pre-cached test runner image (build-only, no runtime) ===
  forge-test-node:
    build:
      context: ./forge-docker-svc
      dockerfile: Dockerfile.test-node
    image: forge-test-node:latest
    entrypoint: ["echo", "image built"]
    restart: "no"
    profiles: ["build-only"]

volumes:
  redis-data:
  pg-data:
  chroma-data:
  workspace:
